name: Run Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      # Start the server in the background
      - name: Start the Server
        run: |
          npm run start-server &  # Replace with the command to start your server
          npx wait-on http://localhost:8080  # Wait until the server is ready

      # Run Cypress Tests
      - name: Run Cypress
        uses: cypress-io/github-action@v5
        with:
          record: true
          browser: chrome
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Optionally stop the server if necessary (not always needed)
      - name: Stop Server
        if: success()
        run: kill $(jobs -p)
